<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DAVVBB</title>
  <meta name="description" content="Passionné de sport, d'investissement, de bien-être et de bonheur." />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="home.css" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
</head>
<body>

  <div id="scrollProgress"></div>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <!-- ═══ NAV — Contact uniquement ═══ -->
  <nav id="navbar">
    <a href="index.html" class="nav-logo" data-magnetic>
      DAVV<em>BB</em><span class="nav-logo-dot"></span>
    </a>
    <ul class="nav-links">
      <li><a href="contact.html" class="nav-cta" data-magnetic>Contact</a></li>
    </ul>
    <div class="hamburger" id="hamburger">
      <span></span><span></span><span></span>
    </div>
  </nav>

  <div class="mobile-menu" id="mobileMenu">
    <a href="contact.html">Contact</a>
  </div>

  <!-- ═══ HERO ═══ -->
  <section class="hero" id="hero">
    <canvas id="heroCanvas" aria-hidden="true"></canvas>
    <div class="hero-orb-1" aria-hidden="true"></div>
    <div class="hero-orb-2" aria-hidden="true"></div>
    <div class="hero-orb-3" aria-hidden="true"></div>
    <div class="hero-lines" aria-hidden="true">
      <div class="hl hl-1"></div>
      <div class="hl hl-2"></div>
      <div class="hl hl-3"></div>
    </div>

    <div class="hero-content container">
      <div class="hero-eyebrow" id="heroEyebrow">
        <span class="eyebrow-bar"></span>
        <span class="eyebrow-text">Live &amp; Relentless</span>
        <span class="eyebrow-dot">●</span>
        <span class="eyebrow-text">DAVVBB</span>
      </div>

      <h1 class="hero-title" id="heroTitle" aria-label="Push Your Limits">
        <span class="ht-line" data-line="1">PUSH</span>
        <span class="ht-line" data-line="2">YOUR</span>
        <span class="ht-line" data-line="3">LIMIT<span class="ht-accent">S.</span></span>
      </h1>
    </div>

    <div class="hero-scroll">
      <div class="hs-line"><div class="hs-dot"></div></div>
      <span class="hs-text">Scroll</span>
    </div>
  </section>

  <!-- ═══ TICKER ═══ -->
  <div class="ticker" id="ticker">
    <div class="ticker-track">
      <span class="ticker-item">Sport</span><span class="ticker-dot">✦</span>
      <span class="ticker-item">Investissement</span><span class="ticker-dot">✦</span>
      <span class="ticker-item">Bien-être</span><span class="ticker-dot">✦</span>
      <span class="ticker-item">Bonheur</span><span class="ticker-dot">✦</span>
      <span class="ticker-item">Performance</span><span class="ticker-dot">✦</span>
      <span class="ticker-item">Growth Mindset</span><span class="ticker-dot">✦</span>
      <span class="ticker-item">Sport</span><span class="ticker-dot">✦</span>
      <span class="ticker-item">Investissement</span><span class="ticker-dot">✦</span>
      <span class="ticker-item">Bien-être</span><span class="ticker-dot">✦</span>
      <span class="ticker-item">Bonheur</span><span class="ticker-dot">✦</span>
      <span class="ticker-item">Performance</span><span class="ticker-dot">✦</span>
      <span class="ticker-item">Growth Mindset</span><span class="ticker-dot">✦</span>
    </div>
  </div>

  <script src="script.js"></script>
  <script src="home.js"></script>
</body>
</html>
